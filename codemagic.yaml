workflows:
  flutter-android:
    name: Flutter Android APK
    max_build_duration: 30
    environment:
      flutter: 3.19.0
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

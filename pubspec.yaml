name: v2ray_client
description: A simple V2Ray/Xray client for Android and iOS
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_v2ray: ^1.1.5
  http: ^1.2.1
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  uuid: ^4.4.0
  path_provider: ^2.1.3
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.6
  url_launcher: ^6.3.0
  clipboard: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/

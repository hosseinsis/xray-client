name: v2ray_client
description: A simple V2Ray/Xray client for Android and iOS
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_v2ray: ^1.1.4
  http: ^1.1.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  uuid: ^4.3.3
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.6
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
